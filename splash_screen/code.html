<!-- Top Branding Accent (Optional/Visual) -->
<div class="w-full pt-xl flex justify-center opacity-40">
<div class="h-1 w-12 bg-primary rounded-full"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin text-center">
<!-- Animated Hero Visual Component -->
<div class="relative mb-xl">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/10 blur-[80px] rounded-full scale-150"></div>
<!-- Central Icon Container -->
<div class="relative w-40 h-40 flex items-center justify-center bg-white rounded-[40px] shadow-[0_20px_50px_rgba(37,99,235,0.12)] glass-panel overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-10">
<span class="material-symbols-outlined text-[120px] text-primary" data-icon="waves">waves</span>
</div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
<div class="mt-xs flex gap-1">
<div class="w-1.5 h-1.5 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-1.5 bg-primary/70 rounded-full"></div>
<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
</div>
</div>
</div>
<!-- Voice Visualization Floating Orbs -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center shadow-lg border border-white/50">
<span class="material-symbols-outlined text-primary text-xl" data-icon="mic">mic</span>
</div>
<div class="absolute -bottom-2 -left-6 px-4 py-2 bg-white rounded-full flex items-center gap-2 shadow-md border border-white/50">
<span class="material-symbols-outlined text-primary text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-primary tracking-wider uppercase">AI READY</span>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-sm max-w-[320px]">
<h1 class="font-display-lg text-on-background tracking-tight">
                AI Interview Coach
            </h1>
<p class="font-body-lg text-on-surface-variant leading-relaxed">
                Practice. Improve. <span class="text-primary font-semibold">Get Selected.</span>
</p>
</div>
<!-- Supportive Visual (Bento-style background element) -->
<div class="mt-xxl grid grid-cols-2 gap-md opacity-60 grayscale-[0.5]">
<div class="p-md rounded-xl glass-panel text-left flex flex-col gap-xs">
<span class="material-symbols-outlined text-primary" data-icon="quick_phrases">quick_phrases</span>
<div class="h-2 w-12 bg-primary/20 rounded-full"></div>
<div class="h-2 w-8 bg-primary/10 rounded-full"></div>
</div>
<div class="p-md rounded-xl glass-panel text-left flex flex-col gap-xs">
<span class="material-symbols-outlined text-primary" data-icon="insights">insights</span>
<div class="h-2 w-10 bg-primary/20 rounded-full"></div>
<div class="h-2 w-14 bg-primary/10 rounded-full"></div>
</div>
</div>
</main>
<!-- Interactive Footer Section -->
<footer class="w-full px-container-margin pb-xxl flex flex-col items-center gap-lg">

<button class="w-full max-w-sm py-md px-xl bg-primary text-on-primary rounded-full font-label-md flex items-center justify-center gap-sm shadow-[0_12px_24px_rgba(0,74,198,0.2)] hover:bg-primary-container transition-all active:scale-95 group">
<span>Get Started</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>

<div class="w-1 h-1 bg-outline rounded-full"></div>
